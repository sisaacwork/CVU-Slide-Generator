# fly.toml — Fly.io deployment configuration for CVU Slides backend
# Deploy with: fly deploy  (from the backend/ directory)

app = "cvu-slides-api"   # change this to your chosen app name when running `fly launch`
primary_region = "iad"   # Washington DC — change to nearest region if preferred

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false   # keep warm — no cold starts for the team
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size   = "shared-cpu-1x"   # 256 MB RAM — sufficient for this workload
  memory = "512mb"
